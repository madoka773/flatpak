app-id: com.alibaba_inc.dingtalk
runtime: org.kde.Platform
runtime-version: "5.15-23.08"
sdk: org.kde.Sdk
command: dingtalk
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/pipewire-0
  - --system-talk-name=org.freedesktop.login1
cleanup:
  - '*.a'
  - '*.la'
  - /include
  - /lib/cmake
  - /lib/debug
  - /lib/pkgconfig
  - /man
  - /share/man
  - /share/gtk-doc
modules:
  - name: libxcrypt
    config-opts:
      - --prefix=/app
      - --enable-shared
      - --enable-obsolute-api=glibc
    sources:
      - type: archive
        url: https://github.com/besser82/libxcrypt/releases/download/v4.4.36/libxcrypt-4.4.36.tar.xz
        sha256: e5e1f4caee0a01de2aee26e3138807d6d3ca2b8e67287966d1fefd65e1fd8943
        x-checker-data:
          type: anitya
          project-id: 16436
          stable-only: true
          url-template: https://github.com/besser82/libxcrypt/releases/download/v$version/libxcrypt-$version.tar.xz

  - name: dingtalk
    buildsystem: simple
    build-commands:
      - install -Dm644 com.alibaba_inc.dingtalk.desktop "${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop"
      - install -Dm644 com.alibaba_inc.dingtalk.metainfo.xml "${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml"
      - install -Dm755 dingtalk.sh "${FLATPAK_DEST}/bin/dingtalk"
      - install -Dm644 icon.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
    sources:
      - type: script
        dest-filename: apply_extra.sh
        commands:
          - bsdtar -Oxf dingtalk.deb 'data.tar.xz' | bsdtar -xf -
          - sed -i -e "s#/opt/apps/com.alibabainc.dingtalk/files/#/app/extra/dingtalk/#g" opt/apps/com.alibabainc.dingtalk/files/Elevator.sh
          - mv opt/apps/com.alibabainc.dingtalk/files/*-Release.*/ dingtalk
          # fix chinese input in workbench
          - rm -r /app/extra/dingtalk/libgtk-x11-2.0.so.*
          - rm -r /app/extra/dingtalk/{libm.so.6,Resources/{i18n/tool/*.exe,qss/mac,web_content/NativeWebContent_*.zip},libstdc*}
          # remove unused lib
          - rm -r /app/extra/dingtalk/{libcurl.so.4,libz*}
          # clean up
          - rm -r dingtalk.deb usr opt
      - type: extra-data
        filename: dingtalk.deb
        size: 336917916
        only-arches:
          - x86_64
        url: https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_7.5.0.40126_amd64.deb
        sha256: 5c9777900f6e9fd75b68f5cb3ba9f4d7edb4c962fc04824a673a2767628c1c14
        x-checker-data:
          type: html
          url: https://pages.dingtalk.com/wh/fragment/dingtalk/default/ddhomefoot2019
          pattern: "(https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_([\\d\\.]+\\d+)_amd64.deb)"
      - type: extra-data
        filename: dingtalk.deb
        size: 332989536
        only-arches:
          - aarch64
        url: https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_7.5.0.40126_arm64.deb
        sha256: 599bf63f98288ef4bab60f52fa6f5ddc95a554c8d093b5b1480650b6de52dae0
        x-checker-data:
          type: html
          url: https://pages.dingtalk.com/wh/fragment/dingtalk/default/ddhomefoot2019
          pattern: "(https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_([\\d\\.]+\\d+)_arm64.deb)"
      - type: file
        path: com.alibaba_inc.dingtalk.desktop
      - type: file
        path: com.alibaba_inc.dingtalk.metainfo.xml
      - type: file
        path: icon.svg
      - type: script
        commands:
          - export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
          - export LD_LIBRARY_PATH=/app/extra/dingtalk:$LD_LIBRARY_PATH
          - export PATH=/app/extra/dingtalk:$PATH
          # try wayland and fallback to xcb in case that it may support xcb some day.
          - export QT_QPA_PLATFORM="wayland;xcb"
          - /app/extra/dingtalk/com.alibabainc.dingtalk "$@"
        dest-filename: dingtalk.sh
